<!-- sldsValidatorIgnore -->
<template>
    <!-- Admin view: show only the component name, no modal -->
    <template if:true={isAdmin}>
        <div class="slds-box slds-theme_default slds-align_absolute-center" style="min-height: 60px; background: rgba(0,0,0,0.08);">
            <span class="slds-text-title_caps" style="font-weight: bold;">Scheduled Maintenance Component (Admin View)</span>
        </div>
    </template>
    <!-- Non-admin view: show modal as normal -->
    <template if:false={isAdmin}>
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <template if:true={isDismissible}>
                            <template if:false={isFullLock}>
                                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={dismissAllRecords}>
                                    <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                                    <span class="slds-assistive-text">Close</span>
                                </button>
                            </template>                        
                        </template>
                        <h2 class="slds-text-heading_large">{title}</h2>
                        <template if:false={isDismissible}>
                            <div class="slds-m-top_large">
                                <lightning-badge label="This App is Closed" class="slds-m-left_medium slds-badge slds-theme_warning"></lightning-badge>
                            </div>
                            <p class="slds-m-top_x-small">To see why this app is closed please review the below items.</p>
                        </template>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium" style="overflow: auto;">
                    <!-- Enhanced: Render 'In Progress' and 'Upcoming' accordions if isInMaintenance is true -->
                    <template if:true={isInMaintenance}>
                        <lightning-accordion allow-multiple-sections-open active-section-name={activeSectionName}>
                            <template if:true={inProgressMaintenances.length}>
                                <lightning-accordion-section name="inProgress" label="In Progress">
                                    <template for:each={inProgressMaintenances} for:item="maint">
                                        <div key={maint.Id} class="slds-box slds-theme_default slds-var-m-bottom_small">
                                            <h2 class="slds-text-heading_small slds-var-m-bottom_small"><strong>{maint.Subject}</strong></h2>
                                            <p class="slds-p-bottom_small"><strong>Description:</strong> {maint.Description__c}</p>
                                            <p><strong>Start:</strong> {maint.startDisplay}</p>
                                            <p><strong>End:</strong> {maint.endDisplay}</p>
                                            <template if:false={maint.Dismissible__c}>
                                                <lightning-badge label={maint.BadgeLabel} class="slds-m-left_xx-small slds-m-top_x-small slds-theme_warning"></lightning-badge>
                                            </template>
                                            <template if:true={maint.appBadges}>
                                                <div class="slds-m-top_x-small">
                                                    <div class="slds-box slds-theme_shade slds-p-around_small slds-m-bottom_xx-small">
                                                        <div class="slds-text-title_caps slds-m-bottom_x-small">Applicable Apps</div>
                                                        <div class="slds-grid slds-wrap slds-gutters_xx-small">
                                                            <template for:each={maint.appBadges} for:item="app">
                                                                <span key={app} class="slds-badge slds-badge_lightest">{app}</span>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </lightning-accordion-section>
                            </template>
                            <template if:true={upcomingMaintenances.length}>
                                <lightning-accordion-section name="upcoming" label="Upcoming">
                                    <template for:each={upcomingMaintenances} for:item="maint">
                                        <div key={maint.Id} class="slds-box slds-theme_default slds-var-m-bottom_small">
                                            <h2 class="slds-text-heading_small slds-var-m-bottom_small"><strong>{maint.Subject}</strong></h2>
                                            <p class="slds-p-bottom_small"><strong>Description:</strong> {maint.Description__c}</p>
                                            <p><strong>Start:</strong> {maint.startDisplay}</p>
                                            <p><strong>End:</strong> {maint.endDisplay}</p>
                                            <template if:false={maint.Dismissible__c}>
                                                <lightning-badge label={maint.BadgeLabel} class="slds-m-left_xx-small slds-m-top_x-small slds-theme_warning"></lightning-badge>
                                            </template>
                                            <template if:true={maint.appBadges}>
                                                <div class="slds-m-top_x-small">
                                                    <div class="slds-box slds-theme_shade slds-p-around_small slds-m-bottom_xx-small">
                                                        <div class="slds-text-title_caps slds-m-bottom_x-small">Applicable Apps</div>
                                                        <div class="slds-grid slds-wrap slds-gutters_xx-small">
                                                            <template for:each={maint.appBadges} for:item="app">
                                                                <span key={app} class="slds-badge slds-badge_lightest">{app}</span>
                                                            </template>
                                                        </div>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </template>
                                </lightning-accordion-section>
                            </template>
                        </lightning-accordion>
                    </template>
                        <!-- Render blocks if isInMaintenance is false -->
                    <template if:false={isInMaintenance}>
                        <template for:each={scheduledMaintenances} for:item="maint">
                            <div key={maint.Id} class="slds-box slds-theme_default slds-var-m-bottom_small">
                                <h2 class="slds-text-heading_small slds-var-m-bottom_small"><strong>{maint.Subject}</strong></h2>
                                <p class="slds-p-bottom_small"><strong>Description:</strong> {maint.Description__c}</p>
                                <p><strong>Start:</strong> {maint.startDisplay}</p>
                                <p><strong>End:</strong> {maint.endDisplay}</p>
                                <template if:false={maint.Dismissible__c}>
                                    <lightning-badge label={maint.BadgeLabel} class="slds-m-left_xx-small slds-m-top_x-small slds-m-top_x-small slds-theme_warning"></lightning-badge>
                                </template>
                                <template if:true={maint.appBadges}>
                                    <div class="slds-m-top_x-small">
                                        <div class="slds-box slds-theme_shade slds-p-around_small slds-m-bottom_xx-small">
                                            <div class="slds-text-title_caps slds-m-bottom_x-small">Applicable Apps</div>
                                            <div class="slds-grid slds-wrap slds-gutters_xx-small">
                                                <template for:each={maint.appBadges} for:item="app">
                                                    <span key={app} class="slds-badge slds-badge_lightest">{app}</span>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <template if:false={isDismissible}>
                        <template if:false={isFullLock}>
                            <lightning-button variant="neutral" label="Navigate to Welcome App" title="Navigate to Welcome App" onclick={navigateToApp}></lightning-button>
                        </template>
                    </template>
                    <template if:true={isDismissible}>
                        <template if:false={isFullLock}>
                            <lightning-button variant="neutral" label="Dismiss" title="Dismiss" onclick={dismissAllRecords}></lightning-button>
                        </template>
                    </template>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
